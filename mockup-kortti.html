<!DOCTYPE html>
<html lang="fi" data-theme="usva">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline';">
<title>Fokus — Korttipeli-mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────────
   FOKUS — TCG-mockup. Standalone, ei backdrop-filteriä.
   Syvyys: gradientit + inset-varjot + rasteritekstuuri.
   ───────────────────────────────────────────────────────── */
:root{
  --accent:#c49a3a;
  --ink:rgba(255,255,255,.95);
  --muted:rgba(255,255,255,.55);
  --q1:#a84c28; --q2:#2d5a3d; --q3:#7a6a50; --q4:#9a9a8e;
  /* taustasävyt teemoittain ylikirjoitetaan */
  --bg-a:#16302a; --bg-b:#0c1a14; --bg-c:#101f18;
  --plate-top:#1a2e26; --plate-bot:#13211b;
}
html[data-theme="havu"]{
  --accent:#4fa870;
  --bg-a:#0a1c12; --bg-b:#04100a; --bg-c:#06140d;
  --plate-top:#13241b; --plate-bot:#0c1812;
}
html[data-theme="aurinko"]{
  --accent:#c4681e;
  --ink:#2d2417; --muted:#7a6a4a;
  --bg-a:#ffe8b8; --bg-b:#fdf3df; --bg-c:#ffedc0;
  --plate-top:#1c2e26; --plate-bot:#14241c; /* kortit pysyvät tummina pöydällä */
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(120% 80% at 50% 0%, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
  min-height:100vh;
  display:flex; flex-direction:column;
  overflow-x:hidden;
}

/* ── Yläpalkki: otsikko + teemavalitsin ───────────────── */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem 1.5rem; gap:1rem; flex-wrap:wrap;
}
.topbar h1{
  font-family:'Cinzel',serif; font-weight:700;
  font-size:1.35rem; letter-spacing:.08em; text-transform:uppercase;
  color:var(--accent);
}
.topbar .sub{ font-size:.72rem; color:var(--muted); letter-spacing:.04em; }
.theme-switch{ display:flex; gap:.4rem; }
.theme-switch button{
  font-family:'Inter',sans-serif; font-size:.7rem; font-weight:500;
  padding:.4rem .7rem; border-radius:8px; cursor:pointer;
  background:rgba(255,255,255,.06); color:var(--ink);
  border:1px solid rgba(255,255,255,.18);
  transition:background .15s,border-color .15s;
}
html[data-theme="aurinko"] .theme-switch button{ background:rgba(0,0,0,.05); border-color:rgba(0,0,0,.15); }
.theme-switch button.on{ background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── Areena ────────────────────────────────────────────── */
.arena-stage{
  flex:1; display:flex; align-items:center; justify-content:center;
  gap:3rem; padding:2rem 1.5rem; position:relative; flex-wrap:wrap;
}
.arena-label{
  position:absolute; top:1rem; left:50%; transform:translateX(-50%);
  font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.3em;
  text-transform:uppercase; color:var(--muted);
}

/* ── Pakka-pino ────────────────────────────────────────── */
.deck{ position:relative; width:128px; height:179px; flex:none; }
.deck__back{
  position:absolute; inset:0; width:128px; aspect-ratio:5/7;
  border-radius:11px;
  background:
    repeating-linear-gradient(45deg, #14241c 0 8px, #182c22 8px 16px),
    linear-gradient(160deg, #1c3a2c, #0e1a14);
  box-shadow:
    inset 0 0 0 4px rgba(196,154,58,.22),
    inset 0 0 0 5px rgba(0,0,0,.5),
    0 4px 10px rgba(0,0,0,.4);
}
.deck__back:nth-child(1){ transform:translate(0,0); }
.deck__back:nth-child(2){ transform:translate(4px,4px); }
.deck__back:nth-child(3){ transform:translate(8px,8px); }
.deck__back .deck__seal{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:'Cinzel',serif; font-weight:700; font-size:1.4rem;
  color:rgba(196,154,58,.5); letter-spacing:.1em;
}
.deck__count{
  position:absolute; bottom:-1.6rem; left:0; right:0; text-align:center;
  font-size:.65rem; color:var(--muted); letter-spacing:.12em; text-transform:uppercase;
}

/* ── KORTTI (yhteinen runko) ───────────────────────────── */
.tcg-card{
  --qc:#a84c28;
  position:relative;
  width:280px; aspect-ratio:5/7;
  border-radius:14px; padding:7px;
  background:var(--qc); /* fallback ennen color-mix */
  background:linear-gradient(160deg,
    color-mix(in srgb, var(--qc) 55%, #14241c) 0%,
    #0e1a14 60%,
    color-mix(in srgb, var(--qc) 35%, #0e1a14) 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.10),
    inset 0 0 0 3px rgba(0,0,0,.35),
    0 2px 0 rgba(0,0,0,.4),
    0 10px 24px rgba(0,0,0,.45);
  isolation:isolate;
}
/* sammakko = legendary kultakehys */
.tcg-card--frog{
  background:#c49a3a;
  background:linear-gradient(160deg, #e8c66a 0%, #6b4f1c 42%, #c49a3a 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.25),
    inset 0 0 0 3px rgba(70,50,12,.6),
    0 2px 0 rgba(0,0,0,.4),
    0 12px 28px rgba(0,0,0,.5);
}

/* sisempi korttilevy */
.tcg-card__plate{
  position:relative; height:100%;
  border-radius:8px; overflow:hidden;
  background:linear-gradient(180deg, var(--plate-top) 0%, var(--plate-bot) 100%);
  box-shadow:inset 0 1px 2px rgba(255,255,255,.06),
             inset 0 -2px 6px rgba(0,0,0,.4);
  display:flex; flex-direction:column;
}

/* mana-kustannus (est) oikea yläkulma */
.tcg-card__cost{
  position:absolute; top:9px; right:9px; z-index:4;
  display:flex; gap:3px; align-items:center;
}
.tcg-card__pip{
  width:17px; height:17px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #e8623a, #a84c28 72%);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.5), 0 1px 2px rgba(0,0,0,.55);
}
.tcg-card__pip--half{
  background:linear-gradient(90deg, #e8623a 50%, rgba(168,76,40,.25) 50%);
}
.tcg-card__pip-x{
  font-family:'Cinzel',serif; font-weight:700; font-size:.7rem;
  color:#f0d9a8; text-shadow:0 1px 2px rgba(0,0,0,.7);
}

/* sammakko-sinetti vasen yläkulma */
.tcg-card__frog-seal{
  position:absolute; top:9px; left:9px; z-index:4;
  width:25px; height:25px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #2d5a3d, #14241c);
  box-shadow:0 0 0 2px #c49a3a, inset 0 1px 2px rgba(255,255,255,.3);
  display:flex; align-items:center; justify-content:center; font-size:14px;
}

/* kuva-alue */
.tcg-card__art{
  position:relative; flex:0 0 40%;
  display:flex; align-items:center; justify-content:center;
  margin:6px 6px 0; border-radius:6px; overflow:hidden;
  background:radial-gradient(ellipse at 50% 30%,
    color-mix(in srgb, var(--qc) 42%, transparent) 0%, #0c1611 82%);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.5), inset 0 0 18px rgba(0,0,0,.55);
}
.tcg-card__art svg{
  width:52%; height:52%; opacity:.95; position:relative; z-index:1;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.6));
}
.tcg-card__art::after{
  content:""; position:absolute; inset:0;
  background-image:radial-gradient(circle, rgba(255,255,255,.05) 1px, transparent 1px);
  background-size:6px 6px;
}

/* tyyppipalkki (verbi = korttityyppi) */
.tcg-card__typeline{
  display:flex; align-items:center; gap:.4rem;
  margin:6px 6px 0; padding:.28rem .55rem;
  font-family:'Cinzel',serif; font-weight:600;
  font-size:.6rem; letter-spacing:.13em; text-transform:uppercase;
  color:#e8dcc0; border-radius:4px;
  background:linear-gradient(180deg, rgba(196,154,58,.30), rgba(196,154,58,.08));
  border-top:1px solid rgba(196,154,58,.5);
  border-bottom:1px solid rgba(0,0,0,.45);
  text-shadow:0 1px 1px rgba(0,0,0,.6);
}
.tcg-card__typeline svg{ width:1.15em; height:1.15em; opacity:.9; flex:none; }
.tcg-card__typeline .tl-quad{ margin-left:auto; opacity:.85; letter-spacing:.1em; }

/* runko: otsikko + meta */
.tcg-card__body{
  flex:1; display:flex; flex-direction:column;
  padding:.55rem .7rem; gap:.4rem; min-height:0;
}
.tcg-card__title{
  font-family:'Inter',sans-serif; font-weight:600; font-size:.92rem;
  line-height:1.25; color:#f4f0e4;
}
.tcg-card__notes{
  font-size:.7rem; color:rgba(255,255,255,.5); line-height:1.4;
  font-style:italic; border-left:2px solid rgba(196,154,58,.4); padding-left:.5rem;
}
.tcg-card__meta{
  margin-top:auto; display:flex; align-items:center; gap:.5rem;
  font-size:.68rem; color:rgba(255,255,255,.6); letter-spacing:.02em;
}
.tcg-card__meta .dot{ opacity:.4; }

/* toimintonapit (vain areena) */
.tcg-card__actions{ display:flex; gap:.3rem; padding:.4rem .55rem .55rem; }
.tcg-card__actions button{
  font-family:'Inter',sans-serif; font-size:.72rem; font-weight:600;
  border:1px solid rgba(196,154,58,.4); border-radius:6px; cursor:pointer;
  padding:.4rem .5rem; background:rgba(0,0,0,.25); color:#f0e6cc;
  transition:background .15s,transform .1s;
}
.tcg-card__actions button:hover{ background:rgba(196,154,58,.25); }
.tcg-card__actions button:active{ transform:translateY(1px); }
.tcg-card__actions .act-start{
  flex:1; background:var(--accent); color:#fff; border-color:var(--accent);
}
.tcg-card__actions .act-start:hover{ filter:brightness(1.1); }

/* HOLO — vain frog + important */
.tcg-card--holo .tcg-card__plate::before{
  content:""; position:absolute; inset:0; z-index:3; pointer-events:none;
  border-radius:8px;
  background:conic-gradient(from 0deg at 50% 50%,
    rgba(255,80,80,.22), rgba(255,220,80,.20), rgba(80,255,160,.22),
    rgba(80,180,255,.20), rgba(200,80,255,.22), rgba(255,80,80,.22));
  mix-blend-mode:color-dodge; opacity:0; transition:opacity .35s;
  -webkit-mask-image:linear-gradient(115deg, transparent 30%, #000 50%, transparent 70%);
  mask-image:linear-gradient(115deg, transparent 30%, #000 50%, transparent 70%);
  -webkit-mask-size:250% 250%; mask-size:250% 250%;
  animation:holoSweep 5s linear infinite;
}
.tcg-card--holo:hover .tcg-card__plate::before{ opacity:.5; }
.tcg-card--arena.tcg-card--holo .tcg-card__plate::before{ opacity:.45; }
@keyframes holoSweep{
  0%{ -webkit-mask-position:0% 0%; mask-position:0% 0%; }
  100%{ -webkit-mask-position:100% 100%; mask-position:100% 100%; }
}

/* areenakortti — isompi + glow-vihje */
.tcg-card--arena{
  width:300px; transform:translateY(-4px);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.10),
    inset 0 0 0 3px rgba(0,0,0,.35),
    0 2px 0 rgba(0,0,0,.4),
    0 14px 32px rgba(0,0,0,.5),
    0 0 36px color-mix(in srgb, var(--accent) 40%, transparent);
}
.tcg-card--arena.tcg-card--frog{
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.25),
    inset 0 0 0 3px rgba(70,50,12,.6),
    0 14px 32px rgba(0,0,0,.55),
    0 0 44px rgba(196,154,58,.45);
}
@keyframes arenaLand{
  0%{ box-shadow:0 0 0 0 rgba(196,154,58,.6), 0 14px 32px rgba(0,0,0,.5); }
  100%{ box-shadow:0 0 0 16px rgba(196,154,58,0), 0 14px 32px rgba(0,0,0,.5); }
}
.tcg-card--arena.just-landed{ animation:arenaLand .6s ease-out; }

/* ── TEHTÄVÄKÄSI — viuhka ──────────────────────────────── */
.hand-wrap{ padding:0 1rem 2.5rem; }
.hand-label{
  text-align:center; font-family:'Cinzel',serif; font-size:.68rem;
  letter-spacing:.28em; text-transform:uppercase; color:var(--muted);
  margin-bottom:.5rem;
}
.tcg-hand{
  display:flex; justify-content:center; align-items:flex-end;
  gap:0; padding-top:40px; /* nostotila */
  overflow:visible; min-height:230px;
}
.tcg-hand .tcg-card{
  width:148px; flex:none; cursor:pointer;
  transform-origin:bottom center;
  transition:transform .2s ease, box-shadow .2s ease;
  margin:0 -14px; /* limitys viuhkaan */
}
.tcg-hand .tcg-card .tcg-card__art{ flex-basis:36%; }
.tcg-hand .tcg-card .tcg-card__title{ font-size:.72rem; }
.tcg-hand .tcg-card .tcg-card__notes{ display:none; }
.tcg-hand .tcg-card .tcg-card__meta{ font-size:.58rem; }
.tcg-hand .tcg-card:nth-child(1){ transform:rotate(-9deg) translateY(14px); }
.tcg-hand .tcg-card:nth-child(2){ transform:rotate(-3deg) translateY(3px); }
.tcg-hand .tcg-card:nth-child(3){ transform:rotate(3deg) translateY(3px); }
.tcg-hand .tcg-card:nth-child(4){ transform:rotate(9deg) translateY(14px); }
.tcg-hand .tcg-card:hover{
  transform:translateY(-30px) scale(1.12) rotate(0deg) !important;
  box-shadow:0 22px 38px rgba(0,0,0,.55),
             0 0 28px color-mix(in srgb, var(--accent) 30%, transparent);
  z-index:10;
}

@keyframes playToArena{
  0%{ transform:translateY(0) scale(1); }
  40%{ transform:translateY(-70px) scale(1.2) rotate(-2deg); opacity:1; }
  100%{ transform:translateY(-120px) scale(1.45); opacity:0; }
}
.tcg-hand .tcg-card.is-playing{
  animation:playToArena .45s cubic-bezier(.34,1.4,.64,1) forwards !important;
  z-index:100;
}

.hint{ text-align:center; font-size:.7rem; color:var(--muted); padding-bottom:1.5rem; }

/* saavutettavuus: liikkeen vähennys */
@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
}

/* perf-lite: holo pois */
html[data-perf="lite"] .tcg-card__plate::before{ display:none; }

/* mobiili */
@media (max-width:680px){
  .arena-stage{ gap:1.5rem; }
  .deck{ display:none; }
  .tcg-card--arena{ width:260px; }
}
</style>
</head>

    <polygon points="6,5 18,5 13.5,10 10.5,10" fill="#c49a3a"/>
    <polygon points="10.5,15 13.5,15 18,19 6,19" fill="#c49a3a"/>
    <polygon points="10.5,15 13.5,15 14,15.5 10,15.5" fill="#8a6620"/>

<header class="topbar">
  <div>
    <h1>Fokus</h1>
    <div class="sub">Tuottavuus korttipelinä — mockup</div>
  </div>
  <div class="theme-switch" id="theme-switch">
    <button data-theme="usva" class="on">🌫 Usva</button>
    <button data-theme="havu">🌲 Havu</button>
    <button data-theme="aurinko">✻ Aurinko</button>
  </div>
</header>

<main class="arena-stage">
  <div class="arena-label">Areena</div>
  <div class="deck" id="deck"></div>
  <div id="arena-slot"></div>
</main>

<section class="hand-wrap">
  <div class="hand-label">Tehtäväkäsi</div>
  <div class="tcg-hand" id="hand"></div>
</section>

<div class="hint">Vie hiiri kortin päälle (nosto) · klikkaa käsikorttia → pelaa areenalle</div>

<script>
/* ── Data ──────────────────────────────────────────────── */
var VERB_ICON = {
  "Soita":"verb-i-soita","Sovi":"verb-i-sovi","Kirjaa":"verb-i-kirjaa",
  "Tee":"verb-i-tee","Selvitä":"verb-i-selvita","Vie":"verb-i-vie",
  "Tarkista":"verb-i-tarkista","Varaa":"verb-i-varaa"
};
var QUAD = {
  q1:{label:"Tee heti",  c:"#a84c28"},
  q2:{label:"Aikatauluta",c:"#2d5a3d"},
  q3:{label:"Delegoi",   c:"#7a6a50"},
  q4:{label:"Poista",    c:"#9a9a8e"}
};

var ARENA = {text:"Soita asiakkaalle takaisin Virtasen asiasta", verbi:"Soita",
  quad:"q1", important:true, urgent:true, est:1, frog:true,
  projekti:"LUVN", lisatiedot:"Lupasin soittaa ennen klo 15."};

var HAND = [
  {text:"Sovi palaveri tiimin kanssa ensi viikolle", verbi:"Sovi", quad:"q2",
   important:true, urgent:false, est:0.5, projekti:"Tiimi"},
  {text:"Kirjaa asiakaskäynnin muistiinpanot järjestelmään", verbi:"Kirjaa", quad:"q1",
   important:true, urgent:true, est:2, projekti:"LUVN"},
  {text:"Selvitä kuntoutustuen hakuprosessi", verbi:"Selvitä", quad:"q2",
   important:true, urgent:false, est:3, projekti:""},
  {text:"Vie raportti esihenkilölle", verbi:"Vie", quad:"q3",
   important:false, urgent:false, est:0.5, projekti:"", waiting:true}
];

/* ── Apurit (vain createElement + textContent, ei innerHTML-emojeja) ── */
function el(tag, cls){ var e=document.createElement(tag); if(cls) e.className=cls; return e; }
function useIcon(id){
  var svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 24 24");
  var u=document.createElementNS("http://www.w3.org/2000/svg","use");
  u.setAttribute("href","#"+id);
  svg.appendChild(u); return svg;
}
function costPips(est){
  var wrap=el("div","tcg-card__cost");
  if(est>4){
    var p=el("div","tcg-card__pip"); wrap.appendChild(p);
    var x=el("span","tcg-card__pip-x"); x.textContent="×"+est; wrap.appendChild(x);
    return wrap;
  }
  var full=Math.floor(est), half=(est%1)>=0.5;
  for(var i=0;i<full;i++) wrap.appendChild(el("div","tcg-card__pip"));
  if(half) wrap.appendChild(el("div","tcg-card__pip tcg-card__pip--half"));
  return wrap;
}

/* ── Kortin rakennus ───────────────────────────────────── */
function buildCard(t, mode){ // mode: 'arena' | 'hand'
  var card=el("div","tcg-card tcg-card--"+mode);
  var q=QUAD[t.quad]||QUAD.q4;
  card.style.setProperty("--qc", q.c);
  if(t.frog) card.classList.add("tcg-card--frog");
  if(t.frog || t.important) card.classList.add("tcg-card--holo");

  // mana-kustannus
  if(t.est) card.appendChild(costPips(t.est));
  // sammakko-sinetti
  if(t.frog){ var seal=el("div","tcg-card__frog-seal"); seal.textContent="🐸"; card.appendChild(seal); }

  var plate=el("div","tcg-card__plate");

  // kuva-alue
  var art=el("div","tcg-card__art");
  var iconId=VERB_ICON[t.verbi]||"verb-i-tee";
  art.appendChild(useIcon(iconId));
  plate.appendChild(art);

  // tyyppipalkki
  var tl=el("div","tcg-card__typeline");
  tl.appendChild(useIcon(iconId));
  var verbSpan=el("span"); verbSpan.textContent=t.verbi; tl.appendChild(verbSpan);
  var quadSpan=el("span","tl-quad"); quadSpan.textContent=q.label; tl.appendChild(quadSpan);
  plate.appendChild(tl);

  // runko
  var body=el("div","tcg-card__body");
  var title=el("div","tcg-card__title"); title.textContent=t.text; body.appendChild(title);
  if(mode==="arena" && t.lisatiedot){
    var notes=el("div","tcg-card__notes"); notes.textContent=t.lisatiedot; body.appendChild(notes);
  }
  var meta=el("div","tcg-card__meta");
  var tom=el("span"); tom.textContent="🍅 ×"+(t.est||1); meta.appendChild(tom);
  if(t.projekti){
    var d=el("span","dot"); d.textContent="·"; meta.appendChild(d);
    var pr=el("span"); pr.textContent=t.projekti; meta.appendChild(pr);
  }
  if(t.waiting){
    var d2=el("span","dot"); d2.textContent="·"; meta.appendChild(d2);
    var w=el("span"); w.textContent="⏳ odottaa"; meta.appendChild(w);
  }
  body.appendChild(meta);
  plate.appendChild(body);

  // toimintonapit vain areenalle
  if(mode==="arena"){
    var acts=el("div","tcg-card__actions");
    var defs=[["act-start","▶ Aloita"],["","✓"],["","→"],["","⏳"]];
    defs.forEach(function(d){
      var b=el("button",d[0]); b.textContent=d[1]; acts.appendChild(b);
    });
    plate.appendChild(acts);
  }

  card.appendChild(plate);
  return card;
}

/* ── Renderöinti ───────────────────────────────────────── */
function renderArena(t){
  var slot=document.getElementById("arena-slot");
  slot.textContent="";
  var c=buildCard(t,"arena");
  slot.appendChild(c);
  // land-pulssi
  void c.offsetWidth;
  c.classList.add("just-landed");
  setTimeout(function(){ c.classList.remove("just-landed"); },650);
}
function renderHand(){
  var hand=document.getElementById("hand");
  hand.textContent="";
  HAND.forEach(function(t,idx){
    var c=buildCard(t,"hand");
    c.addEventListener("click",function(){
      c.classList.add("is-playing");
      setTimeout(function(){
        renderArena(t);
        HAND.splice(idx,1);
        // täydennä käteen pakasta (demodata kiertää)
        HAND.push(t);
        renderHand();
      },430);
    });
    hand.appendChild(c);
  });
}
function renderDeck(){
  var deck=document.getElementById("deck");
  deck.textContent="";
  for(var i=0;i<3;i++){
    var b=el("div","deck__back");
    var s=el("div","deck__seal"); s.textContent="F"; b.appendChild(s);
    deck.appendChild(b);
  }
  var cnt=el("div","deck__count"); cnt.textContent="Pakka · 12"; deck.appendChild(cnt);
}

/* ── Teemavalitsin ─────────────────────────────────────── */
document.getElementById("theme-switch").addEventListener("click",function(e){
  var btn=e.target.closest("button"); if(!btn) return;
  document.documentElement.setAttribute("data-theme",btn.getAttribute("data-theme"));
  this.querySelectorAll("button").forEach(function(b){ b.classList.remove("on"); });
  btn.classList.add("on");
});

renderDeck();
renderArena(ARENA);
renderHand();
</script>
</body>
</html>
